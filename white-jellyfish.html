<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>White Jellyfish Advertisement</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap");

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #f3f4f6;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      /* Main Ad Card Container */
      .ad-container {
        background: #ffffff;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
        width: 100%;
        max-width: 480px;
        overflow: hidden;
        border: 1px solid rgba(0, 0, 0, 0.05);
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      .ad-container:hover {
        transform: translateY(-4px);
        box-shadow: 0 30px 50px rgba(0, 0, 0, 0.1);
      }

      /* Hero Display Frame with Brand Gradient */
      .ad-hero {
        background: linear-gradient(
          135deg,
          #70777a 0%,
          #aab0b3 50%,
          #ffd3da 100%
        );
        padding: 30px 24px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        gap: 16px;
        position: relative;
        min-height: 200px;
      }

      /* Cartoon Illustration Styling */
      .illustration-box {
        background: rgba(255, 255, 255, 0.9);
        border: 3px solid #4a4e51;
        border-radius: 18px;
        padding: 12px;
        width: 45%;
        aspect-ratio: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-shadow: 4px 4px 0px #4a4e51;
        animation: float 4s ease-in-out infinite alternate;
      }

      .illustration-box:nth-child(2) {
        animation-delay: 2s;
      }

      @keyframes float {
        0% {
          transform: translateY(0px) rotate(-1deg);
        }
        100% {
          transform: translateY(-8px) rotate(2deg);
        }
      }

      .illustration-label {
        font-family: "Space Grotesk", sans-serif;
        font-size: 11px;
        font-weight: 700;
        color: #4a4e51;
        margin-top: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* Content Body */
      .ad-content {
        padding: 32px 28px;
      }

      .brand-badge {
        font-family: "Space Grotesk", sans-serif;
        font-size: 12px;
        font-weight: 700;
        color: #d65a7f;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 12px;
        display: inline-block;
      }

      .ad-title {
        font-size: 28px;
        font-weight: 700;
        color: #2c3033;
        line-height: 1.2;
        margin-bottom: 14px;
      }

      .ad-description {
        font-size: 15px;
        color: #61686c;
        line-height: 1.6;
        margin-bottom: 24px;
      }

      /* Interactive Footer Elements */
      .ad-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid #f0f2f3;
        padding-top: 20px;
        gap: 12px;
      }

      .tags-wrapper {
        display: flex;
        gap: 8px;
      }

      .tag {
        font-family: "Space Grotesk", sans-serif;
        font-size: 11px;
        color: #70777a;
        background: #f0f2f3;
        padding: 6px 12px;
        border-radius: 8px;
        font-weight: 500;
      }

      .cta-btn {
        background: #2c3033;
        color: #ffffff;
        border: none;
        padding: 10px 20px;
        border-radius: 12px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        white-space: nowrap;
      }

      .cta-btn:hover {
        background: #d65a7f;
        transform: scale(1.03);
      }
    </style>
  </head>
  <body>
    <div class="ad-container">
      <div class="ad-hero">
        <div class="illustration-box">
          <svg
            width="60"
            height="60"
            viewBox="0 0 60 60"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect
              x="10"
              y="25"
              width="40"
              height="25"
              rx="8"
              fill="#aab0b3"
              stroke="#4a4e51"
              stroke-width="3"
            />
            <circle
              cx="20"
              cy="20"
              r="6"
              fill="#ffb4c1"
              stroke="#4a4e51"
              stroke-width="3"
            />
            <circle
              cx="40"
              cy="18"
              r="8"
              fill="#ff8da1"
              stroke="#4a4e51"
              stroke-width="3"
            />
            <path
              d="M15 35 C 25 30, 35 30, 45 35"
              stroke="#4a4e51"
              stroke-width="3"
              stroke-linecap="round"
            />
          </svg>
          <div class="illustration-label">Made With Love</div>
        </div>

        <div class="illustration-box">
          <svg
            width="60"
            height="60"
            viewBox="0 0 60 60"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M5 45 L55 45"
              stroke="#4a4e51"
              stroke-width="4"
              stroke-linecap="round"
            />
            <path
              d="M12 45 C 12 15, 48 15, 48 45 Z"
              fill="#e1e4e6"
              stroke="#4a4e51"
              stroke-width="3"
            />
            <circle
              cx="30"
              cy="12"
              r="5"
              fill="#ffd3da"
              stroke="#4a4e51"
              stroke-width="3"
            />
            <path
              d="M25 32 L35 32"
              stroke="#ff8da1"
              stroke-width="3"
              stroke-linecap="round"
            />
          </svg>
          <div class="illustration-label">5-Star Luxury</div>
        </div>
      </div>

      <div class="ad-content">
        <span class="brand-badge">White Jellyfish Original</span>
        <h2 class="ad-title">A Taste of Pure Excitement</h2>
        <p class="ad-description">
          Experience authentic Russian finger-food crafted with absolute care.
          Served exclusively across the nation’s premium 5-star venues, bringing
          a kind, delightful twist to gourmet dining.
        </p>

        <div class="ad-footer">
          <div class="tags-wrapper">
            <span class="tag">Premium</span>
            <span class="tag">Authentic</span>
          </div>
          <button
            class="cta-btn"
            onclick="
              alert(
                'Welcome to White Jellyfish! Spreading excitement and kindness.',
              )
            "
          >
            Discover Menu
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
